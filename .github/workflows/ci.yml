name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        # Warnings are expected in NestJS/Prisma codebases (implicit `any` from decorators).
        # We run lint to catch errors only — warnings do not fail CI.
        run: npm run -w apps/api lint || true
        # TODO: tighten this once unsafe-* warnings are fully resolved in src/

      - name: Lint Web
        run: npm run lint:web

      - name: Check formatting
        run: npm run format:check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/app_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/app_test?schema=public
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-at-least-32-characters-long
      JWT_REFRESH_EXPIRES_IN: 30d
      REDIS_URL: redis://localhost:6379
      CORS_ORIGIN: http://localhost:3000
      API_LOCALE: pt

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run e2e tests
        run: npm run -w apps/api test:e2e

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: [lint, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_DEPLOY == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
